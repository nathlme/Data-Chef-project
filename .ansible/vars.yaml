---
# Variables PostgreSQL (geerlingguy.postgresql)
postgresql_python_library: python3-psycopg2
postgresql_service_state: started
postgresql_service_enabled: true

postgresql_global_config_options:
  - option: unix_socket_directories
    value: '/var/run/postgresql'
  - option: listen_addresses
    value: '172.17.10.0/24'
  - option: max_connections
    value: '100'
  - option: shared_buffers
    value: '256MB'

postgresql_hba_entries:
  - { type: local, database: all, user: postgres, auth_method: peer }
  - { type: local, database: all, user: all, auth_method: peer }
  - { type: host, database: all, user: all, address: '127.0.0.1/32', auth_method: md5 }
  - { type: host, database: all, user: all, address: '::1/128', auth_method: md5 }
  - { type: host, database: all, user: all, address: '10.0.0.0/8', auth_method: md5 }

postgresql_databases:
  - name: appdb
    encoding: 'UTF-8'
    lc_collate: 'fr_FR.UTF-8'
    lc_ctype: 'fr_FR.UTF-8'

postgresql_users:
 - name: appuser
   password: "{{ vault_db_password }}"
   encrypted: true
   db: appdb
   priv: "ALL"

 - name: appuser
    password: "{{ vault_db_password }}"
    encrypted: true
    db: appdb
    priv: "ALL"

# Variables Docker Swarm (ckoliber.swarm)
swarm_enabled: true
swarm_manager_nodes: "{{ groups['docker'][0:1] }}"
swarm_worker_nodes: "{{ groups['docker'][1:] | default([]) }}"

# Variables Portainer (shelleg.ansible_role_portainer)
portainer_version: "latest"
portainer_port: 9000
portainer_agent_port: 9001
persistent_data_path: "/opt/portainer"
remove_existing_container: false
remove_persistent_data: false
configure_settings: false
configure_registry: false

